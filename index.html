<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalab | Resultados</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef8f2;
background-image:radial-gradient(circle at top left,#ffffff,#eef8f2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:25px;
}

.tarjeta{
width:420px;
background:#fff;
border-radius:22px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.12);
}

.encabezado{
background:#ffffff;
padding:35px 20px;
text-align:center;
border-bottom:1px solid #eeeeee;
}

.encabezado img{
max-width:230px;
height:auto;
}

.contenido{
padding:40px 35px;
text-align:center;
}

.check{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:#eef9f1;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
color:#18a64b;
margin-bottom:25px;
}

h1{
color:#12943e;
font-size:55px;
font-weight:bold;
}

.subtitulo{
font-size:18px;
color:#555;
margin-top:5px;
margin-bottom:30px;
}

h2{
font-size:24px;
color:#169347;
margin-bottom:12px;
}

.descripcion{
font-size:18px;
color:#555;
line-height:1.5;
margin-bottom:28px;
}

input{
width:100%;
padding:16px;
font-size:18px;
border:2px solid #23a54c;
border-radius:12px;
outline:none;
margin-bottom:20px;
}
button{
width:100%;
padding:18px;
background:#169347;
color:#fff;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#117b3b;
}

.seguridad{
margin-top:25px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
font-size:17px;
color:#555;
}

.seguridad span{
color:#169347;
font-size:22px;
}

iframe{
width:100%;
height:100vh;
border:none;
display:none;
}
</style>
</head>

<body>

<div class="tarjeta" id="login">

<div class="encabezado">
<img src="logo.jpeg" alt="Escalab">
</div>

<div class="contenido">

<div class="check">✓</div>

<h1>Escalab</h1>

<div class="subtitulo">
Resultados de Laboratorio
</div>

<h2>Documento verificado</h2>

<div class="descripcion">
Ingrese su DNI para visualizar su resultado.
</div>

<input
type="password"
id="dni"
placeholder="Ingrese su DNI">

<button onclick="abrirPDF()">
Ver Resultado
</button>

<div class="seguridad">
<span>🔒</span>
Su información está protegida
</div>

</div>

</div>

<iframe id="visor" src=""></iframe>

<script>

function abrirPDF(){

const dni=document.getElementById("dni").value;
function abrirPDF(){

const dni = document.getElementById("dni").value.trim();

if(dni === ""){
alert("Por favor ingrese su DNI");
return;
}

// Ruta del PDF (puedes cambiarla por tu archivo real)
const pdfURL = "resultados/" + dni + ".pdf";

// Ocultar tarjeta de login
document.getElementById("login").style.display = "none";

// Mostrar visor
const visor = document.getElementById("visor");
visor.style.display = "block";
visor.src = pdfURL;

}
</script>

</body>
</html>
