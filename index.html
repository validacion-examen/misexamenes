<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalabs | Resultados</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#ffffff,#eaf7ef);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.tarjeta{
width:420px;
background:#fff;
border-radius:22px;
overflow:hidden;
box-shadow:0 18px 45px rgba(0,0,0,.12);
animation:aparecer .4s ease;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.encabezado{
padding:30px;
text-align:center;
border-bottom:1px solid #eee;
}

.encabezado img{
max-width:220px;
height:auto;
}

.contenido{
padding:35px;
text-align:center;
}

.check{
width:90px;
height:90px;
margin:0 auto 20px;
border-radius:50%;
background:#eafaf0;
display:flex;
justify-content:center;
align-items:center;
}

h1{
color:#12943e;
font-size:34px;
margin-bottom:10px;
}

.subtitulo{
color:#666;
margin-bottom:20px;
}

h2{
color:#169347;
margin-bottom:12px;
}

.descripcion{
color:#666;
line-height:1.5;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border:2px solid #23a54c;
border-radius:12px;
font-size:16px;
outline:none;
margin-bottom:15px;
transition:.3s;
}

input:focus{
border-color:#12943e;
box-shadow:0 0 8px rgba(18,148,62,.2);
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#169347;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#117b3b;
}

.error{
color:#d93025;
font-size:14px;
margin-top:10px;
display:none;
}

.seguridad{
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
color:#666;
font-size:14px;
}

iframe{
width:100%;
height:100vh;
border:none;
display:none;
}

footer{
padding:18px;
text-align:center;
font-size:13px;
color:#888;
border-top:1px solid #eee;
}

</style>
</head>

<body>

<div class="tarjeta" id="login">

<div class="encabezado">
<img src="logo.jpeg" alt="Escalabs">
</div>

<div class="contenido">

<div class="check">

<svg viewBox="0 0 24 24" width="52" height="52">
<path d="M5 13l4 4L19 7"
fill="none"
stroke="#18a64b"
stroke-width="3"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

<h1>Escalabs</h1>

<div class="subtitulo">
Resultados de Laboratorio
</div>

<h2>Documento verificado</h2>

<div class="descripcion">
Ingrese su DNI para visualizar su resultado.
</div>

<input
type="password"
id="dni"
placeholder="Ingrese su DNI"
maxlength="8">

<button onclick="abrirPDF()">
Ver Resultado
</button>

<div class="error" id="error"></div>

<div class="seguridad">

<svg
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="#169347"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<rect x="5" y="11" width="14" height="10" rx="2"></rect>

<path d="M8 11V7a4 4 0 0 1 8 0v4"></path>

</svg>

Su información está protegida

</div>

</div>

<footer>

© Escalabs - Resultados en línea

</footer>

</div>

<iframe id="visor"></iframe>

<script>

document.getElementById("dni").addEventListener("keydown",function(e){

if(e.key==="Enter"){

abrirPDF();

}

});

function abrirPDF(){

const dni=document.getElementById("dni").value.trim();

const error=document.getElementById("error");

error.style.display="none";

if(!/^[0-9]{8}$/.test(dni)){

error.textContent="Ingrese un DNI válido de 8 dígitos";

error.style.display="block";

return;

}
const pdfURL = "resultados/" + dni + ".pdf";

const visor = document.getElementById("visor");

/* Verifica si el PDF existe */
fetch(pdfURL,{method:"HEAD"})
.then(function(res){

if(!res.ok){

throw new Error();

}

/* Oculta la tarjeta */
document.getElementById("login").style.display="none";

/* Muestra el PDF */
visor.style.display="block";
visor.src=pdfURL;

})

.catch(function(){

error.textContent="No se encontró un resultado para ese DNI.";

error.style.display="block";

});

}

</script>

</body>
</html>
