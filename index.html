<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalab | Resultados</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef8f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.contenedor{
width:100%;
max-width:420px;
background:#fff;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.10);
overflow:hidden;
}

.encabezado{
background:#198754;
padding:25px;
text-align:center;
}

.encabezado img{
width:170px;
max-width:100%;
}

.contenido{
padding:35px;
text-align:center;
}

.check{
width:70px;
height:70px;
background:#22c55e;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:36px;
color:white;
margin-bottom:20px;
}

h1{
font-size:30px;
color:#198754;
margin-bottom:8px;
}

.subtitulo{
color:#666;
margin-bottom:30px;
font-size:15px;
}

h2{
color:#222;
font-size:23px;
margin-bottom:10px;
}

.descripcion{
color:#666;
font-size:15px;
line-height:1.5;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border:1px solid #d5d5d5;
border-radius:10px;
font-size:16px;
outline:none;
margin-bottom:18px;
transition:.3s;
}

input:focus{
border-color:#198754;
box-shadow:0 0 0 3px rgba(25,135,84,.15);
}

button{
width:100%;
padding:15px;
background:#198754;
color:white;
font-size:17px;
border:none;
border-radius:10px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

button:hover{
background:#146c43;
}

.seguridad{
margin-top:25px;
font-size:14px;
color:#198754;
font-weight:bold;
}

.seguridad span{
font-size:18px;
vertical-align:middle;
margin-right:6px;
}

</style>
</head>

<body>

<div class="contenedor">

<div class="encabezado">
<img src="logo.jpeg" alt="Escalab">
</div>

<div class="contenido">

<div class="check">✓</div>

<h1>Escalab</h1>

<div class="subtitulo">
Laboratorio Clínico
</div>

<h2>Documento protegido</h2>

<p class="descripcion">
Ingrese su DNI para visualizar su resultado de laboratorio.
</p>

<input
type="text"
id="dni"
placeholder="Ingrese su DNI">

<button onclick="abrirResultado()">
Ver Resultado
</button>

<div class="seguridad">
<span>🔒</span>Su información está protegida
</div>
</div>

</div>

<script>

function abrirResultado(){

let dni = document.getElementById("dni").value.trim();

if(dni=="70814301"){

window.location.href="resultado.pdf";

}else{

alert("El DNI ingresado no es válido. Verifique e intente nuevamente.");

}

}

document.getElementById("dni").addEventListener("keypress",function(e){

if(e.key==="Enter"){

abrirResultado();

}

});

</script>

</body>
</html>
