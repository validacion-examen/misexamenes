<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Resultados</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#eef7f1;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.contenedor{
width:380px;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
text-align:center;
}

.logo{
width:90px;
margin-bottom:15px;
}

h1{
color:#198754;
font-size:30px;
margin-bottom:5px;
}

.subtitulo{
color:#666;
margin-bottom:30px;
}

.tarjeta{
border:1px solid #d8e7dc;
border-radius:15px;
padding:25px;
background:#fafdfb;
}

.icono{
font-size:50px;
margin-bottom:15px;
}

h2{
color:#198754;
margin-bottom:10px;
}

p{
color:#555;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
background:#198754;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#146c43;
}

.seguro{
margin-top:20px;
color:#888;
font-size:14px;
}

</style>

</head>

<body>

<div class="contenedor">

<img src="logo.jpeg" class="logo">

<h1>Mis Resultados</h1>

<div class="subtitulo">
Laboratorio Clínico
</div>

<div class="tarjeta">

<div class="icono">🔒</div>

<h2>Documento protegido</h2>

<p>Ingrese la contraseña para visualizar su resultado.</p>

<input
type="password"
id="clave"
placeholder="Ingrese su contraseña">

<button onclick="abrirResultado()">
Ver Resultado
</button>

<div class="seguro">
🔐 Su información está protegida
</div>

</div>

</div>

<script>

function abrirResultado(){

let clave=document.getElementById("clave").value;

if(clave=="123456"){
window.location.href="resultado.pdf";
}else{
alert("Contraseña incorrecta");
}

}

</script>

</body>
</html>
