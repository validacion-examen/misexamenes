<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados de Laboratorio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#ffffff,#eaf7ef);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.tarjeta{
width:420px;
background:#fff;
border-radius:22px;
overflow:hidden;
box-shadow:0 18px 45px rgba(0,0,0,.12);
}

.encabezado{
padding:30px;
text-align:center;
border-bottom:1px solid #eee;
}

.encabezado img{
max-width:220px;
height:auto;
}

.contenido{
padding:35px;
text-align:center;
}

.check{
width:90px;
height:90px;
margin:0 auto 20px;
border-radius:50%;
background:#eafaf0;
display:flex;
justify-content:center;
align-items:center;
}

.subtitulo{
font-size:20px;
font-weight:bold;
color:#169347;
margin-bottom:15px;
}

h2{
color:#169347;
margin-bottom:12px;
}

.descripcion{
color:#666;
line-height:1.5;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border:2px solid #23a54c;
border-radius:12px;
font-size:16px;
outline:none;
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
background:#169347;
color:#fff;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#117b3b;
}

.error{
display:none;
color:#d93025;
font-size:14px;
margin-top:10px;
}

.seguridad{
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
font-size:14px;
color:#666;
}

iframe{
display:none;
width:100%;
height:100vh;
border:none;
}

</style>
</head>

<body>

<div class="tarjeta" id="login">

<div class="encabezado">
<img src="logo.jpeg" alt="Logo">
</div>

<div class="contenido">

<div class="check">

<svg viewBox="0 0 24 24" width="52" height="52">
<path d="M5 13l4 4L19 7"
fill="none"
stroke="#18a64b"
stroke-width="3"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

<div class="subtitulo">
Resultados de Laboratorio
</div>

<h2>Documento verificado</h2>

<div class="descripcion">
Ingrese su DNI para visualizar su resultado.
</div>

<input
type="password"
id="dni"
placeholder="Ingrese su DNI"
maxlength="8">

<button onclick="abrirPDF()">
Ver Resultado
</button>

<div class="error" id="error"></div>

<div class="seguridad">

<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#169347" stroke-width="2">
<rect x="5" y="11" width="14" height="10" rx="2"></rect>
<path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
</svg>

Su información está protegida

</div>

</div>

</div>

<iframe id="visor"></iframe>

<script>

document.getElementById("dni").addEventListener("keydown",function(e){

if(e.key==="Enter"){
abrirPDF();
}

});

function abrirPDF(){

const dni=document.getElementById("dni").value.trim();

const error=document.getElementById("error");

error.style.display="none";

if(dni!=="70814301"){

error.textContent="DNI no encontrado";

error.style.display="block";

return;

}
document.getElementById("login").style.display="none";

const visor=document.getElementById("visor");

visor.style.display="block";

visor.src="70814301.pdf";

}

</script>

</body>
</html>
