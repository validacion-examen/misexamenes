<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalab | Resultados</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#ffffff,#eaf7ef);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.tarjeta{
width:420px;
background:#fff;
border-radius:22px;
overflow:hidden;
box-shadow:0 18px 45px rgba(0,0,0,.12);
}

.encabezado{
padding:30px;
text-align:center;
border-bottom:1px solid #eee;
background:#fff;
}

.encabezado img{
max-width:220px;
}

/* CHECK */
.check{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:#eafaf0;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:20px;
}

/* CONTENIDO */
.contenido{
padding:35px;
text-align:center;
}

h1{
color:#12943e;
font-size:50px;
}

.subtitulo{
color:#666;
margin:8px 0 25px;
}

h2{
color:#169347;
margin-bottom:10px;
}

.descripcion{
color:#666;
margin-bottom:25px;
line-height:1.5;
}

input{
width:100%;
padding:15px;
border:2px solid #23a54c;
border-radius:12px;
font-size:16px;
outline:none;
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#169347;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#117b3b;
}

.error{
color:#d93025;
font-size:14px;
margin-top:10px;
display:none;
}

.seguridad{
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
color:#666;
font-size:14px;
}

iframe{
width:100%;
height:100vh;
border:none;
display:none;
}

</style>
</head>

<body>

<div class="tarjeta" id="login">

<div class="encabezado">
<img src="logo.jpeg" alt="Escalab">
</div>

<div class="contenido">

<!-- CHECK -->
<div class="check">
<svg viewBox="0 0 24 24" width="52" height="52">
<path d="M5 13l4 4L19 7"
fill="none"
stroke="#18a64b"
stroke-width="3"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>
</div>

<h1>Escalab</h1>
